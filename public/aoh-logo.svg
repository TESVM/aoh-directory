<svg width="720" height="720" viewBox="0 0 720 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7E39A"/>
      <stop offset="50%" stop-color="#C99712"/>
      <stop offset="100%" stop-color="#8D6207"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F8FB"/>
      <stop offset="100%" stop-color="#D0D2DA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#161616" flood-opacity="0.18"/>
    </filter>
    <path id="topArc" d="M 118 196 A 245 245 0 0 1 602 196"/>
    <path id="bottomArc" d="M 602 524 A 245 245 0 0 1 118 524"/>
  </defs>

  <rect width="720" height="720" rx="48" fill="#FFFFFF"/>

  <g filter="url(#shadow)">
    <circle cx="360" cy="360" r="274" stroke="url(#silver)" stroke-width="26" fill="none"/>
    <path d="M360 82V638" stroke="url(#gold)" stroke-width="66" stroke-linecap="square"/>
    <path d="M118 286H602" stroke="url(#gold)" stroke-width="66" stroke-linecap="square"/>
  </g>

  <circle cx="360" cy="360" r="248" stroke="#EEEAF6" stroke-width="12" fill="none"/>

  <text fill="#1B1A1E" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800" letter-spacing="2.2">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">APOSTOLIC OVERCOMING HOLY</textPath>
  </text>
  <text fill="#1B1A1E" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800" letter-spacing="2.2">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">CHURCH OF GOD, INC.</textPath>
  </text>

  <text x="360" y="425" fill="#5A2390" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="136" font-weight="900" text-anchor="middle" letter-spacing="8" stroke="#32114E" stroke-width="6">A.O.H.</text>
  <text x="360" y="475" fill="#1B1A1E" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800" letter-spacing="6" text-anchor="middle">MARCH 16, 1916</text>
</svg>
