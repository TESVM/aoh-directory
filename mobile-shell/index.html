<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>AOH Directory Mobile Shell</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Avenir Next", "Segoe UI", Helvetica, Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(180deg, #17352f 0%, #234d45 100%);
        color: #ffffff;
      }

      main {
        width: min(100%, 32rem);
        border-radius: 28px;
        padding: 24px;
        background: rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18);
        backdrop-filter: blur(20px);
      }

      h1 {
        margin: 0 0 12px;
        font: 700 2rem/1.1 Georgia, "Times New Roman", serif;
      }

      p {
        margin: 0 0 12px;
        line-height: 1.6;
      }

      code {
        padding: 0.15rem 0.4rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AOH Church of God Directory</h1>
      <p>This native wrapper is ready.</p>
      <p>If you ever change the live website address from <code>https://aoh-directory.vercel.app/aoh</code>, update <code>CAP_SERVER_URL</code> and run <code>npm run mobile:sync</code>.</p>
    </main>
  </body>
</html>
